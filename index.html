                    { szoveg: "Megtartom a sajátomat!", osztaly: "btn-elutasit", akcio: () => { rejtFlipAjanlat(); bankarAjanlatotTesz(baseOffer); } }
                ]);
            }
        }

        // --- Régi csavarok adoptálva Duelre ---
        function bankarIdozitettBomba(baseOffer, o1, o2, isDuel) {
            let bB = baseOffer * 1.35; let bR = baseOffer * 0.65;
            let o1B = o1 * 1.35; let o2B = o2 * 1.35;
            let timeLeft = 10;
            let leirasHTML = `<div style="color:#ef4444; font-weight:bold; font-size:1.2rem; margin-bottom:5px;">CSAK 10 MÁSODPERCED VAN!</div><div id="timer-bar-container"><div id="timer-bar"></div></div>Azonnal dönts(etek), vagy az ajánlat megsemmisül!`;

            if (isDuel) {
                mutassParbajAjanlatot(o1B, o2B, leirasHTML);
            } else {
                mutassFlipAjanlat("IDŐZÍTETT BOMBA!", formatValuta(bB), leirasHTML,[
                    { szoveg: "Gyorsan, Áll az Alku!", osztaly: "btn-elfogad", akcio: () => { clearInterval(timeBombInterval); rejtFlipAjanlat(); alkuKezelese(bB, 'elfogad'); }},
                    { szoveg: "Nem kérem!", osztaly: "btn-elutasit", akcio: () => { clearInterval(timeBombInterval); rejtFlipAjanlat(); alkuKezelese(bB, 'elutasit'); }}
                ]);
            }

            const timerBar = document.getElementById('timer-bar');

                { szoveg: "Nincs alku!", osztaly: "btn-elutasit", akcio: async () => {
                    rejtFlipAjanlat(); gameState.isProcessingClick = true;
                    mutassUzenetet("BÁTOR DÖNTÉS!", "A Bankárt lenyűgözte a bátorságod!", "+500.000 Ft jóváírva a bónusz számládon!");
                    gameState.bonuszPenz += 500000; rogzitAjanlat(formatValuta(baseOffer), 'Elutasítva (Rejtett Bónusz +500k)');
                    await wait(3500); gameState.isProcessingClick = false; kovetkezoKor();
                }}
            ]);
        }

        function bankarTargyCsomag(baseOffer) {
            const targyak = gameState.maradekNyeremenyek.filter(n => n.type === 'targy' || n.type === 'vicc');
            if (targyak.length < 3) { bankarAjanlatotTesz(baseOffer); return; }
            const csomag = kever(targyak).slice(0, 3).map(t => t.display).join(" ÉS ");
            let leiras = `A Bankár felajánl egy csomagot: <br><b>${csomag}</b>!<br><span style='color:#fca5a5; font-weight:bold;'>(Ha elfogadod, ez lesz a végleges nyereményed!)</span>`;
            mutassFlipAjanlat("TÁRGYHALMOZÓ!", "Nincs pénz!", leiras,[
                { szoveg: "Áll az Alku!", osztaly: "btn-elfogad", akcio: () => { mutassUzenetet("Döntés rögzítve!", "Adminisztráció..."); rejtFlipAjanlat(); alkuKezelese(csomag, 'elfogad'); }},
                { szoveg: "Inkább a pénz kéne...", osztaly: "btn-elutasit", akcio: () => { mutassUzenetet("Döntés rögzítve!", "Megyünk tovább..."); rejtFlipAjanlat(); alkuKezelese(baseOffer, 'elutasit'); }}
            ]);
        }

        function bankarVakCserePenzzel(baseOffer) {
            const zartElemek = Array.from(document.querySelectorAll('.taska:not(.nyitott)')).filter(t => t.dataset.taskaId != gameState.sajatTaska);
            const ujTaskaId = getRandomElem(zartElemek).dataset.taskaId; const reszPenz = Math.round((baseOffer * 0.4)/1000)*1000;
            let leiras = `Ad ennyi pénzt zsebbe, DE elcseréli a táskád a(z) ${ujTaskaId}. táskára!<br><span style='color:#fca5a5; font-weight:bold;'>(A játék utána folytatódik!)</span>`;
            mutassFlipAjanlat("VAK CSERE PÉNZZE!", formatValuta(reszPenz), leiras,[
                { szoveg: "Pénz zsebbe és Csere!", osztaly: "btn-elfogad", akcio: () => {
                    mutassUzenetet(`BÓNUSZ MEGSZEREZVE: ${formatValuta(reszPenz)}`, `Táskák kicserélve! A játék folytatódik.`); rejtFlipAjanlat();
                    document.querySelector(`.taska[data-taska-id='${gameState.sajatTaska}']`).classList.remove('sajat-taskam');
                    gameState.sajatTaska = ujTaskaId; document.querySelector(`.taska[data-taska-id='${ujTaskaId}']`).classList.add('sajat-taskam');
                    gameState.bonuszPenz += reszPenz; rogzitAjanlat(`Vak Csere + ${formatValuta(reszPenz)}`, 'Elfogadva'); setTimeout(kovetkezoKor, 3000);
                }},
                { szoveg: "Ezt nem vállalom!", osztaly: "btn-elutasit", akcio: () => { mutassUzenetet("Döntés rögzítve!", "Megyünk tovább..."); rejtFlipAjanlat(); alkuKezelese(baseOffer, 'elutasit'); }}
            ]);
        }

        function bankarSzabadCsere(baseOffer) {
            let leiras = `A Bankár ajánlata VAGY elcserélheted a táskád BÁRMELYIK zártra!<br><span style='color:#fca5a5; font-weight:bold;'>(A csere után a játék folytatódik!)</span>`;
            mutassFlipAjanlat("PÉNZ VAGY CSERE!", formatValuta(baseOffer), leiras,[
                { szoveg: "Kérem a pénzt!", osztaly: "btn-elfogad", akcio: () => { mutassUzenetet("Döntés rögzítve!", "Adminisztráció..."); rejtFlipAjanlat(); alkuKezelese(baseOffer, 'elfogad'); }},
                { szoveg: "Cserélni akarok!", osztaly: "btn-extra", akcio: () => { mutassUzenetet("SZABAD CSERE!", "Kattints arra a zárt táskára, amelyikre el akarod cserélni a sajátodat!"); rejtFlipAjanlat(); gameState.allapot = 'szabad_csere'; gameState.isProcessingClick = false; }},
                { szoveg: "Nincs alku!", osztaly: "btn-elutasit", akcio: () => { mutassUzenetet("Döntés rögzítve!", "Megyünk tovább..."); rejtFlipAjanlat(); alkuKezelese(baseOffer, 'elutasit'); }}
            ]);
        }

        function bankarBlackout(baseOffer, o1, o2, isDuel) {
            let leiras = `A Bankár zseniális alkut ajánl, de fenyegetőzik: <br><span style='color:#fca5a5; font-weight:bold;'>Ha elutasítod, lekapcsolja a villanyt, összekeveri a táskákat, és a következő nyitásokat a SÖTÉTBEN kell megtenned!</span>`;
            
            if (isDuel) {
                gameState.blackoutThreatActive = true;
                mutassParbajAjanlatot(o1, o2, leiras);
            } else {
                mutassFlipAjanlat("FENYEGETÉS: ÁRAMSZÜNET!", formatValuta(baseOffer), leiras,[
                    { szoveg: "Megveszem, nincs sötét!", osztaly: "btn-elfogad", akcio: () => { rejtFlipAjanlat(); alkuKezelese(baseOffer, 'elfogad'); }},
                    { szoveg: "Nem érdekel, lekapcsolhatod!", osztaly: "btn-elutasit", akcio: async () => {
                        rejtFlipAjanlat(); rogzitAjanlat(formatValuta(baseOffer), 'Elutasítva (Áramszünet jön)');
                        await executeBlackout();
                    }}
                ]);
            }
        }

        async function executeBlackout() {
            gameState.isProcessingClick = true;
            mutassUzenetet("A BANKÁR BEVÁLTOTTA ÍGÉRETÉT!", "Áramszünet a stúdióban...", "", true); await wait(2000);
            document.querySelectorAll('.taska').forEach(t => t.classList.remove('radar-celpont', 'pajzs-celpont', 'rontgen-celpont', 'tusz-celpont'));
            document.body.classList.add('bg-blackout'); gameState.isBlackout = true; 
            const closedCases = Array.from(document.querySelectorAll('.taska:not(.nyitott)'));
            const closedIds = closedCases.map(t => t.dataset.taskaId);
            const values = closedIds.map(id => gameState.taskaErtekek[id]);
            const shuffledValues = kever(values);
            closedIds.forEach((id, index) => {
                gameState.taskaErtekek[id] = shuffledValues[index];
                document.querySelector(`.taska[data-taska-id='${id}'] .taska-osszeg`).innerHTML = shuffledValues[index].display;
            });
            syncGameState();
            mutassUzenetet("VAKREPÜLÉS!", "A gép csendben összekeverte a táskákat! Csak a kör végén fogod megtudni, miket nyitottál ki!"); await wait(2500);
            kovetkezoKor();
        }

        async function bankarSoronKivuli(kiesoNyeremeny, tipus) {
            mutassUzenetet("A BANKÁR KÖZBESZÓL!", "Megcsörrent a telefon soron kívül!", "", true); await wait(3500);

            let alapAjanlat = calculateBankerOffer();
            
            if (tipus === "cinikus") {
                let cinikusAjanlat = Math.round((alapAjanlat * (Math.random() * 0.05 + 0.01)) / 100) * 100; if (cinikusAjanlat < 100) cinikusAjanlat = 100;
                let leiras = `Látom, kiment a(z) <b>${kiesoNyeremeny.display}</b>! A Bankár jót nevet rajtad, és felajánl egy kis aprót vigaszdíjnak buszjegyre...<br><span style='color:#fca5a5; font-weight:bold;'>(Ha elfogadod, ez lesz a végleges nyereményed!)</span>`;
                mutassFlipAjanlat("CINIKUS AJÁNLAT", formatValuta(cinikusAjanlat), leiras,[
                    { szoveg: "Ezt komolyan gondolja?! Elfogadom...", osztaly: "btn-elfogad", akcio: () => elfogadSoronKivuli(cinikusAjanlat, "Cinikus Bankár") },
                    { szoveg: "Kinevetem és megyek tovább!", osztaly: "btn-elutasit", akcio: () => elutasitSoronKivuli(cinikusAjanlat, "Cinikus Bankár") }
                ]);
            } else if (tipus === "vicces") {
                let viccesTargy = getRandomElem(BANKER_SURPRISE_JOKES);
                let leiras = `Kiment a(z) <b>${kiesoNyeremeny.display}</b>! A Bankár kárörvendve felajánlja neked ezt a "nagyszerű" vigaszdíjat!<br><span style='color:#fca5a5; font-weight:bold;'>(Ha elfogadod, a játék véget ér!)</span>`;
                mutassFlipAjanlat("VIGASZDÍJ?", viccesTargy, leiras,[
                    { szoveg: "Jobb, mint a semmi...", osztaly: "btn-elfogad", akcio: () => elfogadSoronKivuli(viccesTargy, "Vigaszdíj") },
                    { szoveg: "Nem kérem a szemetét!", osztaly: "btn-elutasit", akcio: () => elutasitSoronKivuli(viccesTargy, "Vigaszdíj") }
                ]);
            } else if (tipus === "rendkivuli") {
                let premiumAjanlat = Math.round((alapAjanlat * (Math.random() * 0.4 + 1.2)) / 1000) * 1000;
                let maxVal = Math.max(...gameState.maradekNyeremenyek.map(n => n.value));
                if (premiumAjanlat >= maxVal) premiumAjanlat = Math.round(maxVal * 0.85 / 1000) * 1000;
                if (premiumAjanlat < 1000) premiumAjanlat = 1000;
                let leiras = `A Bankár bepánikolt, mert túl jól állsz! AZONNAL le akarja zárni a játékot egy rendkívüli ajánlattal!<br><span style='color:#fca5a5; font-weight:bold;'>(Ha elfogadod, ez lesz a végleges nyereményed!)</span>`;
                mutassFlipAjanlat("PÁNIK AJÁNLAT!", formatValuta(premiumAjanlat), leiras,[
                    { szoveg: "Megveszem!", osztaly: "btn-elfogad", akcio: () => elfogadSoronKivuli(premiumAjanlat, "Pánikoló Bankár") },
                    { szoveg: "Nem adom fel!", osztaly: "btn-elutasit", akcio: () => elutasitSoronKivuli(premiumAjanlat, "Pánikoló Bankár") }
                ]);
            }
        }

        function elfogadSoronKivuli(ajanlatErtek, tipus) {
            mutassUzenetet("Döntés rögzítve!", "Adminisztráció..."); rejtFlipAjanlat(); 
            gameState.nyertOsszeg = ajanlatErtek; gameState.marEladta = true; DOM.panikGomb.disabled = true; DOM.pajzsGomb.disabled = true; DOM.radarGomb.disabled = true;
            let kiiras = typeof ajanlatErtek === 'number' ? formatValuta(ajanlatErtek) : ajanlatErtek;
            rogzitAjanlat(`${tipus}: ${kiiras}`, 'Elfogadva'); gameState.allapot = 'alku_elfogadva_kijatszas';
            mutassUzenetet(`ÁLL AZ ALKU SORON KÍVÜL! Megnyerted ezt: ${kiiras}!`, `De a játék megy tovább. Lássuk a kijátszást!`);
            setTimeout(folytatNyitasUtan, 4500); 
        }

        function elutasitSoronKivuli(ajanlatErtek, tipus) {
            mutassUzenetet("Döntés rögzítve!", "Megyünk tovább..."); rejtFlipAjanlat();
            let kiiras = typeof ajanlatErtek === 'number' ? formatValuta(ajanlatErtek) : ajanlatErtek;
            rogzitAjanlat(`Soron kívüli (${tipus}): ${kiiras}`, 'Elutasítva'); setTimeout(folytatNyitasUtan, 1500);
        }

        // Duel decisions that trigger global board effects
        async function lezardParbaj() {
            gameState.isProcessingClick = true;
            syncGameState();
            mutassUzenetet("PÁRBAJ VÉGE!", "Lássuk, mi volt a táskátokban!");
            await wait(2000);

            const t1 = document.querySelector(`.taska[data-taska-id='${gameState.duel.p1Case}']`);
            if (t1 && !t1.classList.contains('nyitott')) {
                t1.classList.add('animacio-nyitas'); syncGameState(); await wait(1500);
                t1.classList.remove('animacio-nyitas'); t1.classList.add('nyitott'); syncGameState();
                let v1 = gameState.taskaErtekek[gameState.duel.p1Case];
                let msg1 = "";
                if (gameState.duel.p1Status === 'accepted') {
                    msg1 = `${v1.display}! (De kiszállt: ${formatValuta(gameState.duel.p1Winnings)})`;
                } else {
                    msg1 = `${v1.display}! (Megnyerte)`;
                    gameState.duel.p1Winnings = v1.value;
                    awardWinMoney(v1.value, gameState.duel.p1Name);
                }
                mutassUzenetet(`${gameState.duel.p1Name} (P1) TÁSKÁJA:`, msg1);
                await wait(4000);
            }

            const t2 = document.querySelector(`.taska[data-taska-id='${gameState.duel.p2Case}']`);
            if (t2 && !t2.classList.contains('nyitott')) {
                t2.classList.add('animacio-nyitas'); syncGameState(); await wait(1500);
                t2.classList.remove('animacio-nyitas'); t2.classList.add('nyitott'); syncGameState();
                let v2 = gameState.taskaErtekek[gameState.duel.p2Case];
                let msg2 = "";
                if (gameState.duel.p2Status === 'accepted') {
                    msg2 = `${v2.display}! (De kiszállt: ${formatValuta(gameState.duel.p2Winnings)})`;
                } else {
                    msg2 = `${v2.display}! (Megnyerte)`;
                    gameState.duel.p2Winnings = v2.value;
                    awardWinMoney(v2.value, gameState.duel.p2Name);
                }
                mutassUzenetet(`${gameState.duel.p2Name} (P2) TÁSKÁJA:`, msg2);
                await wait(4000);
            }

            let w1 = gameState.duel.p1Winnings || 0;
            let w2 = gameState.duel.p2Winnings || 0;
            let finalMsg = `${gameState.duel.p1Name}: ${formatValuta(w1)}<br>${gameState.duel.p2Name}: ${formatValuta(w2)}`;
            let winnerTxt = "";
            if (w1 > w2) winnerTxt = `🏆 GYŐZTES: ${gameState.duel.p1Name}!`;
            else if (w2 > w1) winnerTxt = `🏆 GYŐZTES: ${gameState.duel.p2Name}!`;
            else winnerTxt = `🤝 DÖNTETLEN!`;

            let ctaHtml = `<br><br><button id="final-lobby-btn" style="background:#f8b500; color:#000; padding:10px 20px; font-weight:bold; border-radius:5px; cursor:pointer; font-family:'Orbitron'; border:2px solid #fff; margin-top:10px;">Vissza a Lobbyba</button>`;

            mutassUzenetet(winnerTxt, finalMsg + ctaHtml);
            startCelebration();
            document.body.classList.add('bg-winning');
            syncGameState();

            setTimeout(() => {
                const btn = document.getElementById('final-lobby-btn');
                if(btn) {
                    btn.addEventListener('click', async () => {
                        btn.innerText = "Kilépés folyamatban..."; btn.disabled = true;
                        if(window.cleanupRoom) await window.cleanupRoom(); window.location.reload();
                    });
                }
            }, 100);
        }

    </script>
</body>
</html>
