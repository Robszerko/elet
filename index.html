                { szoveg: "Nem használom ki a hibát...", osztaly: "btn-elutasit", akcio: () => { clearTimeout(tevedesTimer); rejtFlipAjanlat(); alkuKezelese(baseOffer, 'elutasit'); } }
            ]);
        }

        function bankarDuelKotelhuzas(baseOffer) {
            let pool = Math.round((baseOffer * 3) / 1000) * 1000;
            gameState.duel.sharedPool = pool;
            gameState.activeOfferType = 'duel_kotelhuzas';
            
            gameState.duel.p2Buttons =[
                { text: "25%-ot kérek", colorClass: "btn-elfogad", value: "25" },
                { text: "50%-ot kérek", colorClass: "btn-koteg", value: "50" },
                { text: "75%-ot kérek", colorClass: "btn-elutasit", value: "75" }
            ];

            let leiras = `A Bankár letett egy gigantikus <span style="color:#facc15; font-weight:bold; font-size:1.2rem;">${formatValuta(pool)}</span> összegű KÖZÖS ALAPOT az asztalra!<br><br><span style="color:#fff;">Válasszátok ki VAKON a saját képernyőtökön, hogy hány százalékot követeltek belőle!</span><br><br><span style="color:#10b981; font-weight:bold;">HA A KETTŐTÖK KÉRÉSE <= 100%:</span> Mindketten megkapjátok a kért részt, és a játék véget ér!<br><span style="color:#ef4444; font-weight:bold;">HA TÚLLÉPITEK A 100%-OT:</span> Mohók voltatok! Senki sem kap semmit, és megy tovább a játék büntetéssel!`;

            mutassFlipAjanlat("MOHÓSÁG TESZT (KÖTÉLHÚZÁS)", formatValuta(pool), leiras,[
                { szoveg: "25%-ot kérek", osztaly: "btn-elfogad", akcio: () => hostDuelDecision('25') },
                { szoveg: "50%-ot kérek", osztaly: "btn-koteg", akcio: () => hostDuelDecision('50') },
                { szoveg: "75%-ot kérek", osztaly: "btn-elutasit", akcio: () => hostDuelDecision('75') }
            ]);
        }

        function bankarDuelNagylelku(o1, o2) {
            gameState.duel.p1Offer = o1; gameState.duel.p2Offer = o2;
            gameState.activeOfferType = 'duel_nagylelku';
            
            gameState.duel.p2Buttons =[
                { text: "MEGTARTOM a sajátom", colorClass: "btn-elfogad", value: "take" },
                { text: "ODAADOM A DUPLÁJÁT neki", colorClass: "btn-extra", value: "give" }
            ];

            let leirasHTML = `
                <div class="duel-offers-container">
                    <div class="duel-offer-box duel-o-p1"><h4>${gameState.duel.p1Name}</h4><h2>${formatValuta(o1)}</h2></div>
                    <div class="duel-offer-box duel-o-p2"><h4>${gameState.duel.p2Name}</h4><h2>${formatValuta(o2)}</h2></div>
                </div>
                <br><span style="color:#facc15; font-weight:bold;">A DÖNTÉS TITKOS:</span><br>Választhatod, hogy simán megtartod a saját ajánlatodat (És vége a játékodnak).<br>VAGY lemondasz a sajátodról (0 Ft), és cserébe a <span style="color:#10b981; font-weight:bold;">DUPLÁJÁT</span> kapja meg a társad ajándékba!<br><br>Figyelem: Ha mindketten rányomtok valamelyikre, a Párbaj azonnal véget ér! Nincs elutasítás.
            `;
            
            mutassFlipAjanlat("NAGYLELKŰSÉG VAGY ÖNZÉS?", "Titkos Dilemma", leirasHTML,[
                { szoveg: "MEGTARTOM a sajátom", osztaly: "btn-elfogad", akcio: () => hostDuelDecision('take') },
                { szoveg: "ODAADOM A DUPLÁJÁT neki", osztaly: "btn-extra", akcio: () => hostDuelDecision('give') }
            ]);
        }

        // ==========================================
        // DÖNTÉSEK KIÉRTÉKELÉSE (KIEGÉSZÍTVE AZ ÚJ PÁRBAJJAL)
        // ==========================================

        function hostDuelDecision(decision) {
            gameState.duel.p1Decision = decision;
            DOM.backGombokTarolo.innerHTML = '<span style="color:gray;">Várakozás a másik játékosra (P2)...</span>';
            checkDuelDecisions();
        }

        async function checkDuelDecisions() {
            if (gameState.duel.p1Decision !== null && gameState.duel.p2Decision !== null) {
                rejtFlipAjanlat();
                let d1 = gameState.duel.p1Decision;
                let d2 = gameState.duel.p2Decision;
                let type = gameState.activeOfferType;
                
                let p1Name = gameState.duel.p1Name; let p2Name = gameState.duel.p2Name;
                let msgFo = "DÖNTÉS SZÜLETETT!"; let msgKieg = "";

                gameState.duel.p1Decision = null; gameState.duel.p2Decision = null; gameState.activeOfferType = 'normal';
                
                if (type === 'duel_split') {
                    if (d1 === 'accept' && d2 === 'accept') {
                        msgKieg = "MINDKETTEN ELFOGADTÁTOK! A JÁTÉK VÉGET ÉRT!";
                        gameState.duel.p1Status = 'accepted'; gameState.duel.p2Status = 'accepted';
                        gameState.duel.p1Winnings = gameState.duel.p1Offer; gameState.duel.p2Winnings = gameState.duel.p2Offer;
                        awardWinMoney(gameState.duel.p1Offer, p1Name); awardWinMoney(gameState.duel.p2Offer, p2Name);
                        mutassUzenetet(msgFo, msgKieg); await wait(3000); lezardParbaj(); return;
                    } else if (d1 === 'accept') {
                        msgKieg = `${p1Name} ELFOGADTA, de ${p2Name} ELUTASÍTOTTA!`;
                        gameState.duel.p1Status = 'accepted'; gameState.duel.p1Winnings = gameState.duel.p1Offer;
                        awardWinMoney(gameState.duel.p1Offer, p1Name); gameState.duel.turn = 'p2'; 
                    } else if (d2 === 'accept') {
                        msgKieg = `${p2Name} ELFOGADTA, de ${p1Name} ELUTASÍTOTTA!`;
                        gameState.duel.p2Status = 'accepted'; gameState.duel.p2Winnings = gameState.duel.p2Offer;
                        awardWinMoney(gameState.duel.p2Offer, p2Name); gameState.duel.turn = 'p1';
                    } else {
                        msgKieg = "MINDKETTEN ELUTASÍTOTTÁTOK! A Bankár dühöng!";
                    }
                } 
                // --- ÚJ PÁRBAJ KIÉRTÉKELÉSEK ---
                else if (type === 'duel_kotelhuzas') {
                    let req1 = parseInt(d1); let req2 = parseInt(d2);
                    let totalReq = req1 + req2;
                    if (totalReq <= 100) {
                        msgKieg = `TÖKÉLETES EGYENSÚLY! Kértetek: ${req1}% és ${req2}% (Összesen: ${totalReq}%). Mindketten viszitek a kért pénzt!`;
                        gameState.duel.p1Winnings = (gameState.duel.sharedPool * req1) / 100;
                        gameState.duel.p2Winnings = (gameState.duel.sharedPool * req2) / 100;
                        gameState.duel.p1Status = 'accepted'; gameState.duel.p2Status = 'accepted';
                        awardWinMoney(gameState.duel.p1Winnings, p1Name); awardWinMoney(gameState.duel.p2Winnings, p2Name);
                        mutassUzenetet("SIKERES KÖTÉLHÚZÁS!", msgKieg); await wait(4000); lezardParbaj(); return;
                    } else {
                        msgKieg = `MOHÓSÁG! Kértetek: ${req1}% és ${req2}% (Összesen: ${totalReq}% > 100%). AZ ÜZLET BESÜLT, senki nem kap semmit, megyünk tovább!`;
                        mutassUzenetet("ELBUKTÁTOK!", msgKieg); await wait(4000);
                        gameState.duelPenalty = 0.8; // Büntetés a mohóságért
                    }
                }
                else if (type === 'duel_nagylelku') {
                    let w1 = 0; let w2 = 0;
                    if (d1 === 'take' && d2 === 'take') {
                        msgKieg = "Mindketten megtartottátok a sajátotokat. Nincs meglepetés.";
                        w1 = gameState.duel.p1Offer; w2 = gameState.duel.p2Offer;
                    } else if (d1 === 'give' && d2 === 'take') {
                        msgKieg = `HŐS CSERKÉSZ! ${p1Name} feláldozta a nyereményét, így ${p2Name} hatalmas pénzzel távozik!`;
                        w1 = 0; w2 = gameState.duel.p2Offer + (gameState.duel.p1Offer * 2);
                    } else if (d1 === 'take' && d2 === 'give') {
                        msgKieg = `HŐS CSERKÉSZ! ${p2Name} feláldozta a nyereményét, így ${p1Name} hatalmas pénzzel távozik!`;
                        w1 = gameState.duel.p1Offer + (gameState.duel.p2Offer * 2); w2 = 0;
                    } else if (d1 === 'give' && d2 === 'give') {
                        msgKieg = "KÖLCSÖNÖS NAGYLELKŰSÉG! Mindketten odaadtátok a dupláját a másiknak! Őrületes nyeremények!";
                        w1 = gameState.duel.p2Offer * 2; w2 = gameState.duel.p1Offer * 2;
                    }
                    gameState.duel.p1Winnings = w1; gameState.duel.p2Winnings = w2;
                    gameState.duel.p1Status = 'accepted'; gameState.duel.p2Status = 'accepted';
                    awardWinMoney(w1, p1Name); awardWinMoney(w2, p2Name);
                    mutassUzenetet("A VÉGSŐ DÖNTÉS!", msgKieg); await wait(5000); lezardParbaj(); return;
                }
                // ---------------------------------
                else if (type === 'duel_joint') {
                    if (d1 === 'accept' && d2 === 'accept') {
                        msgKieg = `CSAPATMUNKA! Elfeleztétek a gigantikus összeget (${formatValuta(gameState.duel.p1Offer * 2)})!`;
                        gameState.duel.p1Status = 'accepted'; gameState.duel.p2Status = 'accepted';
                        gameState.duel.p1Winnings = gameState.duel.p1Offer; gameState.duel.p2Winnings = gameState.duel.p2Offer;
                        awardWinMoney(gameState.duel.p1Offer, p1Name); awardWinMoney(gameState.duel.p2Offer, p2Name);
                        mutassUzenetet(msgFo, msgKieg); await wait(3000); lezardParbaj(); return;
                    } else {
                        msgKieg = "NEM VOLT EGYETÉRTÉS! Az üzlet kútba esett, és a Bankár 30%-kal bünteti a jövőt!";
                        gameState.duelPenalty = 0.7;
                    }
                }
                else if (type === 'duel_swap') {
                    if (d1 === 'swap' || d2 === 'swap') {
                        msgKieg = "CSILLAGOK HÁBORÚJA! A táskák kicserélődtek!";
                        let temp = gameState.duel.p1Case; gameState.duel.p1Case = gameState.duel.p2Case; gameState.duel.p2Case = temp;
                        document.querySelector(`.taska.sajat-p1`).classList.replace('sajat-p1', 'temp-p1');
                        document.querySelector(`.taska.sajat-p2`).classList.replace('sajat-p2', 'sajat-p1');
                        document.querySelector(`.taska.temp-p1`).classList.replace('temp-p1', 'sajat-p2');
                    } else {
                        msgKieg = "BÉKE VAN! Senki sem akart cserélni, minden marad a régiben!";
                    }
                }
                else if (type === 'duel_sabotage') {
                    let p1Acc = d1 === 'accept'; let p2Acc = d2 === 'accept';
                    if (p1Acc && p2Acc) {
                        msgKieg = "MINDKETTEN ELFOGADTÁTOK! A JÁTÉK VÉGET ÉRT!";
                        gameState.duel.p1Status = 'accepted'; gameState.duel.p2Status = 'accepted';
                        gameState.duel.p1Winnings = gameState.duel.p1Offer; gameState.duel.p2Winnings = gameState.duel.p2Offer;
                        mutassUzenetet(msgFo, msgKieg); await wait(3000); lezardParbaj(); return;
                    } else if (p1Acc && !p2Acc) {
                        msgKieg = `${p1Name} KISZÁLLT, DE ${p2Name} SZABOTÁLT! ${p1Name}-nek extra táskát kellett volna nyitnia, de már eladta!`;
                        gameState.duel.p1Status = 'accepted'; gameState.duel.p1Winnings = gameState.duel.p1Offer;
                        awardWinMoney(gameState.duel.p1Offer, p1Name); gameState.duel.turn = 'p2'; 
                    } else if (!p1Acc && p2Acc) {
                        msgKieg = `${p2Name} KISZÁLLT, DE ${p1Name} SZABOTÁLT! ${p2Name}-nek extra táskát kellett volna nyitnia, de már eladta!`;
                        gameState.duel.p2Status = 'accepted'; gameState.duel.p2Winnings = gameState.duel.p2Offer;
                        awardWinMoney(gameState.duel.p2Offer, p2Name); gameState.duel.turn = 'p1';
                    } else {
                        msgKieg = "KÖLCSÖNÖS SZABOTÁZS! Mindketten rányomtatok! A következő körben a gép random kinyit 2 táskát a tábláról büntetésből!";
                        mutassUzenetet(msgFo, msgKieg); await wait(3500);
                        await executeRandomOpens(2);
                        kovetkezoKor(); return;
                    }
                }
                else if (type === 'duel_roulette') {
                    if (d1 === 'pass' && d2 === 'pass') {
                        msgKieg = "GYÁVÁK! A Bankár dühében azonnal levon 20%-ot a jövőbeli ajánlatokból!";
                        gameState.duelPenalty = 0.8;
                    } else {
                        msgKieg = "MEGHÚZTÁTOK A RAVASZT! Pörög a rulett...";
                        mutassUzenetet(msgFo, msgKieg); await wait(2500);
                        let winner = Math.random() > 0.5 ? 'p1' : 'p2';
                        let winMsg = winner === 'p1' ? `${p1Name} ajánlata DUPLÁZÓDIK, ${p2Name} AJÁNLATA FELEZŐDIK!` : `${p2Name} ajánlata DUPLÁZÓDIK, ${p1Name} AJÁNLATA FELEZŐDIK!`;
                        let newO1 = winner === 'p1' ? gameState.duel.p1Offer * 2 : gameState.duel.p1Offer * 0.5;
                        let newO2 = winner === 'p2' ? gameState.duel.p2Offer * 2 : gameState.duel.p2Offer * 0.5;
                        
                        proceedWithOffer(0, newO1, newO2, true, `<span style='color:#facc15'>A RULETT EREDMÉNYE: ${winMsg}</span>`);
                        return; // Exit early to wait for next normal decision
                    }
                }
                else if (type === 'duel_betrayal') {
                    let p1Acc = d1 === 'accept'; let p2Acc = d2 === 'accept';
                    if (p1Acc && p2Acc) {
                        msgKieg = "MINDKETTEN ELFOGADTÁTOK! Békés befejezés, senki sem lopott!";
                        gameState.duel.p1Status = 'accepted'; gameState.duel.p2Status = 'accepted';
                        gameState.duel.p1Winnings = gameState.duel.p1Offer; gameState.duel.p2Winnings = gameState.duel.p2Offer;
                        awardWinMoney(gameState.duel.p1Offer, p1Name); awardWinMoney(gameState.duel.p2Offer, p2Name);
                        mutassUzenetet(msgFo, msgKieg); await wait(3000); lezardParbaj(); return;
                    } else if (p1Acc && !p2Acc) {
                        msgKieg = `ÁRULÁS! ${p1Name} elfogadta, KISZÁLLT, és el fogja lopni ${p2Name} végső nyereményének 20%-át!`;
                        gameState.duel.p1Status = 'accepted'; gameState.duel.p1Winnings = gameState.duel.p1Offer;
                        gameState.duel.thief = 'p1'; 
                        gameState.duel.turn = 'p2'; 
                    } else if (!p1Acc && p2Acc) {
                        msgKieg = `ÁRULÁS! ${p2Name} elfogadta, KISZÁLLT, és el fogja lopni ${p1Name} végső nyereményének 20%-át!`;
                        gameState.duel.p2Status = 'accepted'; gameState.duel.p2Winnings = gameState.duel.p2Offer;
                        gameState.duel.thief = 'p2';
                        gameState.duel.turn = 'p1';
                    } else {
                        msgKieg = "BÜSZKESÉG! Mindketten elutasítottátok, a játék megy tovább tisztán!";
                    }
                }
                else if (type === 'duel_bloodpact') {
                    let p1Acc = d1 === 'accept'; let p2Acc = d2 === 'accept';
                    if (p1Acc && p2Acc) {
                        msgKieg = "MINDKETTEN MEGVETTÉTEK! A JÁTÉK VÉGET ÉRT!";
                        gameState.duel.p1Status = 'accepted'; gameState.duel.p2Status = 'accepted';
                        gameState.duel.p1Winnings = gameState.duel.p1Offer; gameState.duel.p2Winnings = gameState.duel.p2Offer;
                        mutassUzenetet(msgFo, msgKieg); await wait(3000); lezardParbaj(); return;
                    } else if (p1Acc) {
                        msgKieg = `${p1Name} ELFOGADTA és megmenekült, de ${p2Name} ELUTASÍTOTTA! Mivel egyikőtök elfogadta, a tábla megúszta a robbanást!`;
                        gameState.duel.p1Status = 'accepted'; gameState.duel.p1Winnings = gameState.duel.p1Offer;
                        awardWinMoney(gameState.duel.p1Offer, p1Name); gameState.duel.turn = 'p2'; 
                    } else if (p2Acc) {
                        msgKieg = `${p2Name} ELFOGADTA és megmenekült, de ${p1Name} ELUTASÍTOTTA! Mivel egyikőtök elfogadta, a tábla megúszta a robbanást!`;
                        gameState.duel.p2Status = 'accepted'; gameState.duel.p2Winnings = gameState.duel.p2Offer;
                        awardWinMoney(gameState.duel.p2Offer, p2Name); gameState.duel.turn = 'p1';
                    } else {
                        msgKieg = "A BANKÁR DÜHÖNG! Mindketten elutasítottátok! A LEGNAGYOBB ÖSSZEG FELROBBAN!";
                        mutassUzenetet(msgFo, msgKieg); await wait(3500);
                        await triggerMaxCaseKill(); return;
                    }
                }
                else if (type === 'duel_judgment') {
                    let p1Val = gameState.taskaErtekek[gameState.duel.p1Case].value;
                    let p2Val = gameState.taskaErtekek[gameState.duel.p2Case].value;
                    let sum = p1Val + p2Val;
                    
                    if (d1 === 'share' && d2 === 'share') {
                        msgKieg = "BÉKE ÉS SZERETET! Mindketten osztoztatok, így testvériesen elfelezitek az összegeket!";
                        gameState.duel.p1Winnings = sum / 2; gameState.duel.p2Winnings = sum / 2;
                    } else if (d1 === 'steal' && d2 === 'share') {
                        msgKieg = `ALJAS HÚZÁS! ${p1Name} LOPOTT, ${p2Name} OSZTOZOTT! ${p1Name} viszi mindkét táska tartalmát!`;
                        gameState.duel.p1Winnings = sum; gameState.duel.p2Winnings = 0;
                    } else if (d2 === 'steal' && d1 === 'share') {
                        msgKieg = `ALJAS HÚZÁS! ${p2Name} LOPOTT, ${p1Name} OSZTOZOTT! ${p2Name} viszi mindkét táska tartalmát!`;
                        gameState.duel.p2Winnings = sum; gameState.duel.p1Winnings = 0;
                    } else {
                        msgKieg = "MOHÓSÁG! Mindketten lopni akartatok! A BANKÁR NYERT, MINDKETTEN ÜRES KÉZZEL TÁVOZTOK!";
                        gameState.duel.p1Winnings = 0; gameState.duel.p2Winnings = 0;
                    }
                    
                    gameState.duel.p1Status = 'accepted'; gameState.duel.p2Status = 'accepted';
                    mutassUzenetet("VÉGÍTÉLET!", msgKieg); await wait(5000); lezardParbaj(); return;
                }

                mutassUzenetet(msgFo, msgKieg); await wait(4000);

                gameState.allapot = 'nyitogatas';
                if (gameState.isPanicOffer) {
                    gameState.isPanicOffer = false; frissitNyitasiSzoveg(); gameState.isProcessingClick = false;
                } else {
                    kovetkezoKor();
                }
            } else { syncGameState(); }
        }

        async function executeRandomOpens(count) {
            for(let i=0; i<count; i++) {
                const closedCases = Array.from(document.querySelectorAll('.taska:not(.nyitott)')).filter(t => t.dataset.taskaId != gameState.duel.p1Case && t.dataset.taskaId != gameState.duel.p2Case);
                if (closedCases.length > 0) {
                    let target = getRandomElem(closedCases);
                    await kinyitTaska(target.dataset.taskaId, true);
                    await wait(1500);
                }
            }
        }

        // --- SOLO ALAP AJÁNLAT & ADMINISZTRÁCIÓ ---

        function bankarAjanlatotTesz(ertek, targyAjanlat = null) {
            gameState.currentOffer = targyAjanlat || ertek;
            gameState.activeOfferType = 'single';
            let gombok =[
                { szoveg: "Áll az Alku!", osztaly: "btn-elfogad", akcio: () => alkuKezelese(targyAjanlat || ertek, 'elfogad') },
                { szoveg: "Nincs alku!", osztaly: "btn-elutasit", akcio: () => alkuKezelese(targyAjanlat || ertek, 'elutasit') }
            ];

            if (gameState.aktualisKor === 0 && !gameState.hasznaltVisszaajanlas && !targyAjanlat) {
                gombok.push({
                    szoveg: "Ellenajánlat", osztaly: "btn-koteg", akcio: () => {
                        DOM.backGombokTarolo.innerHTML = `<input type='number' id='alku-input' placeholder='Összeg Ft' min='100' step='1000'> <button class='back-gomb btn-elfogad' onclick='window.ellenAjanlatKezelese(${ertek})'>Ajánlat</button> <button class='back-gomb btn-elutasit' onclick='rejtFlipAjanlat(); bankarAjanlatotTesz(${ertek})'>Mégse</button>`;
                    }
                });
            }
            
            mutassFlipAjanlat("A Bankár Ajánlata", targyAjanlat ? targyAjanlat : formatValuta(ertek), "Garantált nyeremény, ha kiszállsz.", gombok);
        }

        window.ellenAjanlatKezelese = async function(eredetiAjanlat) {
            const beirt = parseInt(document.getElementById('alku-input').value);
            if(isNaN(beirt) || beirt <= 0) return;
            gameState.hasznaltVisszaajanlas = true; rejtFlipAjanlat(); mutassUzenetet("A Bankár gondolkodik...", "Vajon elfogadja az ellenajánlatod?", "", true); await wait(3000);
            
            const maxVal = Math.max(...gameState.maradekNyeremenyek.map(n => n.value));
            let acceptChance = 0.2; if (beirt <= eredetiAjanlat * 1.1) acceptChance = 0.9; else if (beirt <= eredetiAjanlat * 1.5) acceptChance = 0.6; else if (beirt > maxVal) acceptChance = 0;
            
            if (Math.random() < acceptChance) {
                ujraFlipAjanlat("A BANKÁR ELFOGADTA!", formatValuta(beirt), "Hihetetlen! A Bankár belement az alkudba!",[
                    { szoveg: "Tovább a kijátszáshoz", osztaly: "btn-vegso", akcio: () => { rejtFlipAjanlat(); alkuKezelese(beirt, 'elfogad'); } }
                ]);
            } else {
                ujraFlipAjanlat("A BANKÁR ELUTASÍTOTTA!", "NEM", "Túl sokat kértél! A Bankár csapott a telefonra!",[
                    { szoveg: "Vissza az eredetihez", osztaly: "btn-vegso", akcio: () => { rejtFlipAjanlat(); bankarAjanlatotTesz(eredetiAjanlat); } }
                ]);
            }
        };

        function alkuKezelese(ajanlatErtek, dontes) {
            rejtFlipAjanlat();
            let kiiras = typeof ajanlatErtek === 'number' ? formatValuta(ajanlatErtek) : ajanlatErtek;

            if (dontes === 'elfogad') {
                if (gameState.duel.active && window.gameRole === 'p2') {
                     gameState.duel.p2Status = 'accepted'; gameState.duel.p2Winnings = ajanlatErtek;
                     awardWinMoney(ajanlatErtek, gameState.duel.p2Name);
                     gameState.allapot = 'nyitogatas'; lezardParbaj();
                     return;
                }
                gameState.nyertOsszeg = ajanlatErtek; gameState.marEladta = true; 
                DOM.panikGomb.disabled = true; DOM.pajzsGomb.disabled = true; DOM.radarGomb.disabled = true;
                rogzitAjanlat(kiiras, 'Elfogadva'); gameState.allapot = 'alku_elfogadva_kijatszas';
                mutassUzenetet(`ÁLL AZ ALKU! Megnyerted ezt: ${kiiras}!`, `De a játék megy tovább. Lássuk a kijátszást!`);
                if (!gameState.duel.active) {
                    awardWinMoney(ajanlatErtek);
                } else if (gameState.duel.active && window.gameRole === 'host') {
                    if (gameState.duel.turn === 'p1') {
                        gameState.duel.p1Status = 'accepted'; gameState.duel.p1Winnings = ajanlatErtek;
                        awardWinMoney(ajanlatErtek, gameState.duel.p1Name);
                        gameState.duel.turn = 'p2';
                    } else {
                        gameState.duel.p2Status = 'accepted'; gameState.duel.p2Winnings = ajanlatErtek;
                        awardWinMoney(ajanlatErtek, gameState.duel.p2Name);
                        gameState.duel.turn = 'p1';
                    }
                }
                
                if (gameState.duel.active && gameState.duel.p1Status === 'accepted' && gameState.duel.p2Status === 'accepted') {
                     lezardParbaj();
                } else {
                    setTimeout(folytatNyitasUtan, 3500);
                }

            } else {
                rogzitAjanlat(kiiras, 'Elutasítva');
                if (gameState.isPanicOffer) { gameState.isPanicOffer = false; frissitNyitasiSzoveg(); gameState.isProcessingClick = false; }
                else { kovetkezoKor(); }
            }
        }

        function kovetkezoKor() {
            gameState.aktualisKor++;
            gameState.megNyitando = NYITASI_SZAMLALO[Math.min(gameState.aktualisKor, NYITASI_SZAMLALO.length - 1)];
            gameState.allapot = 'nyitogatas';
            switchTurn();
            frissitNyitasiSzoveg();
            gameState.isProcessingClick = false;
            syncGameState();
        }

        function rogzitAjanlat(ertekSzoveg, dontes) {
            gameState.offerHistory.push({ ertek: ertekSzoveg, dontes: dontes });
            DOM.ajanlatTortenet.classList.remove('rejtett');
            const li = document.createElement('li');
            li.innerHTML = `<span>${gameState.aktualisKor + 1}. Ajánlat: ${ertekSzoveg}</span> <span class="${dontes.includes('Elfogadva') ? 'ajanlat-dontes-elfogadva' : 'ajanlat-dontes-elutasitva'}">${dontes}</span>`;
            if(dontes.includes('Elfogadva')) li.classList.add('ajanlat-lista-elfogadva-sor');
            DOM.ajanlatLista.appendChild(li);
            syncGameState();
        }

        async function finalShowdown() {
            gameState.isProcessingClick = true; DOM.infoFlipper.classList.remove('flipped');
            
            const vegsok = Array.from(document.querySelectorAll('.taska:not(.nyitott)')).map(t => parseInt(t.dataset.taskaId));
            const masikId = vegsok.find(id => id != gameState.sajatTaska);
            
            let valasztottTwist = null;
            if (Math.random() < 0.25 && !gameState.marEladta) {
                let endTwists =['hirtelen_halal', 'utolso_kiserletes', 'vak_licit']; valasztottTwist = getRandomElem(endTwists);
            }

            if (valasztottTwist === 'hirtelen_halal') {
                mutassFlipAjanlat("HIRTELEN HALÁL CSERE", "Nincs alku!", "A Bankár felajánlja a cserét, de ha elfogadod, <span style='color:red'>-500.000 Ft-ot levon a nyereményedből!</span>",[
                    { szoveg: "Cserélek és fizetek!", osztaly: "btn-elfogad", akcio: () => vegrehajtFinalCsere(masikId, true) },
                    { szoveg: "Maradok a sajátomnál!", osztaly: "btn-elutasit", akcio: () => inditVegsoNyitas(masikId) }
                ]);
            } else if (valasztottTwist === 'utolso_kiserletes') {
                let offer = calculateBankerOffer();
                mutassFlipAjanlat("UTOLSÓ UTÁNI AJÁNLAT!", formatValuta(offer), "A Bankár megrettent, és tesz egy legutolsó ajánlatot a dobozok kinyitása előtt!",[
                    { szoveg: "Megveszem! Áll az Alku!", osztaly: "btn-elfogad", akcio: () => alkuKezelese(offer, 'elfogad') },
                    { szoveg: "Nincs alku!", osztaly: "btn-elutasit", akcio: () => inditVegsoNyitas(masikId) }
                ]);
            } else {
                mutassFlipAjanlat("AZ UTOLSÓ DÖNTÉS", "Csere?", "A Bankár felajánlja a cserét! Elcseréled a saját táskád?",[
                    { szoveg: "Igen, Cserélek!", osztaly: "btn-elfogad", akcio: () => vegrehajtFinalCsere(masikId, false) },
                    { szoveg: "Nem, Megtartom!", osztaly: "btn-elutasit", akcio: () => inditVegsoNyitas(masikId) }
                ]);
            }
        }

        async function vegrehajtFinalCsere(masikId, fizetosCsere) {
            rejtFlipAjanlat();
            if (fizetosCsere) { gameState.bonuszPenz -= 500000; mutassUzenetet("FIZETŐS CSERE!", "A Bankár levont 500.000 Ft-ot!", "", true); await wait(2500); }
            document.querySelector(`.taska[data-taska-id='${gameState.sajatTaska}']`).classList.remove('sajat-taskam');
            gameState.sajatTaska = masikId;
            document.querySelector(`.taska[data-taska-id='${masikId}']`).classList.add('sajat-taskam');
            mutassUzenetet("CSERE MEGTÖRTÉNT!", `Az új táskád a(z) ${masikId}.`); await wait(2500);
            inditVegsoNyitas(vegsok.find(id => id != gameState.sajatTaska));
        }

        async function inditVegsoNyitas(masikId) {
            rejtFlipAjanlat();
            gameState.allapot = 'vegsokattintas';
            mutassUzenetet("AZ IGAZSÁG PILLANATA...", "Lássuk, mi volt a másik táskában!");
            await kinyitTaska(masikId);
        }

        async function kinyitVegsoTaska(id) {
            const taskaElem = document.querySelector(`.taska[data-taska-id='${id}']`);
            taskaElem.classList.remove('villogo-vegsokattintas');
            taskaElem.classList.add('animacio-nyitas'); syncGameState();
            mutassUzenetet("NYÍLIK A TÁSKÁD!", "A pulzus az egekben...", "", true);
            await wait(1500);
            taskaElem.classList.remove('animacio-nyitas'); taskaElem.classList.add('nyitott'); syncGameState();

            let vegsNyeremeny = gameState.taskaErtekek[id];
            
            if (gameState.duel.active) {
                if (id == gameState.duel.p1Case && gameState.duel.p1Status !== 'accepted') {
                    gameState.duel.p1Winnings = vegsNyeremeny.value; awardWinMoney(vegsNyeremeny.value, gameState.duel.p1Name);
                }
                if (id == gameState.duel.p2Case && gameState.duel.p2Status !== 'accepted') {
                    gameState.duel.p2Winnings = vegsNyeremeny.value; awardWinMoney(vegsNyeremeny.value, gameState.duel.p2Name);
                }
            } else {
                let totalOsszeg = vegsNyeremeny.value + gameState.bonuszPenz;
                let nyertE = vegsNyeremeny.value > gameState.initialAverage;
                if(gameState.marEladta) {
                    if(gameState.nyertOsszeg > vegsNyeremeny.value) {
                        nyertE = true; mutassUzenetet("ZSENIÁLIS KIJÁTSZÁS!", `A táskádban csak ${vegsNyeremeny.display} volt! Te viszont eladtad ennyiért: ${formatNyeremeny(gameState.nyertOsszeg)}! Bónusz: ${formatValuta(gameState.bonuszPenz)}`);
                        awardWinMoney((typeof gameState.nyertOsszeg === 'number' ? gameState.nyertOsszeg : 0) + gameState.bonuszPenz);
                    } else {
                        nyertE = false; mutassUzenetet("ROSSZ DÖNTÉS!", `A táskádban ${vegsNyeremeny.display} volt! Te meg eladtad ennyiért: ${formatNyeremeny(gameState.nyertOsszeg)}... Bónusz: ${formatValuta(gameState.bonuszPenz)}`);
                    }
                } else {
                    mutassUzenetet(nyertE ? getRandomElem(EPIC_WIN_MESSAGES) : "Vége a játéknak!", `A nyereményed: ${vegsNyeremeny.display}! Bónusz: ${formatValuta(gameState.bonuszPenz)}<br>Összesen: ${formatValuta(totalOsszeg)}!`, nyertE ? getRandomElem(HAPPY_ENDINGS) : getRandomElem(SAD_ENDINGS));
                    if(typeof vegsNyeremeny.value === 'number') { awardWinMoney(totalOsszeg); }
                }
                
                if(nyertE) { startCelebration(); document.body.classList.add('bg-winning'); } 
                else { document.body.classList.add('bg-losing'); }
                
                DOM.ujJatekGomb.style.transform = "scale(1.2)"; DOM.ujJatekGomb.style.animation = "pulse-gold 2s infinite";
                syncGameState();
            }
        }

        async function lezardParbaj() {
            gameState.isProcessingClick = true;
            syncGameState();
            mutassUzenetet("PÁRBAJ VÉGE!", "Lássuk, mi volt a táskátokban!");
            await wait(2000);

            const t1 = document.querySelector(`.taska[data-taska-id='${gameState.duel.p1Case}']`);
            if (t1 && !t1.classList.contains('nyitott')) {
                t1.classList.add('animacio-nyitas'); syncGameState(); await wait(1500);
                t1.classList.remove('animacio-nyitas'); t1.classList.add('nyitott'); syncGameState();
                let v1 = gameState.taskaErtekek[gameState.duel.p1Case];
                let msg1 = "";
                if (gameState.duel.p1Status === 'accepted') {
                    msg1 = `${v1.display}! (De kiszállt: ${formatValuta(gameState.duel.p1Winnings)})`;
                } else {
                    msg1 = `${v1.display}! (Megnyerte)`;
                    gameState.duel.p1Winnings = v1.value;
                    awardWinMoney(v1.value, gameState.duel.p1Name);
                }
                mutassUzenetet(`${gameState.duel.p1Name} (P1) TÁSKÁJA:`, msg1);
                await wait(4000);
            }

            const t2 = document.querySelector(`.taska[data-taska-id='${gameState.duel.p2Case}']`);
            if (t2 && !t2.classList.contains('nyitott')) {
                t2.classList.add('animacio-nyitas'); syncGameState(); await wait(1500);
                t2.classList.remove('animacio-nyitas'); t2.classList.add('nyitott'); syncGameState();
                let v2 = gameState.taskaErtekek[gameState.duel.p2Case];
                let msg2 = "";
                if (gameState.duel.p2Status === 'accepted') {
                    msg2 = `${v2.display}! (De kiszállt: ${formatValuta(gameState.duel.p2Winnings)})`;
                } else {
                    msg2 = `${v2.display}! (Megnyerte)`;
                    gameState.duel.p2Winnings = v2.value;
                    awardWinMoney(v2.value, gameState.duel.p2Name);
                }
                mutassUzenetet(`${gameState.duel.p2Name} (P2) TÁSKÁJA:`, msg2);
                await wait(4000);
            }

            if (gameState.duel.thief === 'p1') {
                let stolen = gameState.duel.p2Winnings * 0.2;
                gameState.duel.p2Winnings -= stolen;
                gameState.duel.p1Winnings += stolen;
                mutassUzenetet("ÁRULÁS BEHAJTÁSA!", `${gameState.duel.p1Name} ELLOPOTT ${formatValuta(stolen)}-t ${gameState.duel.p2Name} nyereményéből!`);
                await wait(4000);
            } else if (gameState.duel.thief === 'p2') {
                let stolen = gameState.duel.p1Winnings * 0.2;
                gameState.duel.p1Winnings -= stolen;
                gameState.duel.p2Winnings += stolen;
                mutassUzenetet("ÁRULÁS BEHAJTÁSA!", `${gameState.duel.p2Name} ELLOPOTT ${formatValuta(stolen)}-t ${gameState.duel.p1Name} nyereményéből!`);
                await wait(4000);
            }

            let w1 = gameState.duel.p1Winnings || 0;
            let w2 = gameState.duel.p2Winnings || 0;
            let finalMsg = `${gameState.duel.p1Name}: ${formatValuta(w1)}<br>${gameState.duel.p2Name}: ${formatValuta(w2)}`;
            let winnerTxt = "";
            if (w1 > w2) winnerTxt = `🏆 GYŐZTES: ${gameState.duel.p1Name}!`;
            else if (w2 > w1) winnerTxt = `🏆 GYŐZTES: ${gameState.duel.p2Name}!`;
            else winnerTxt = `🤝 DÖNTETLEN!`;

            let ctaHtml = `<br><br><button id="final-lobby-btn" style="background:#f8b500; color:#000; padding:10px 20px; font-weight:bold; border-radius:5px; cursor:pointer; font-family:'Orbitron'; border:2px solid #fff; margin-top:10px;">Vissza a Lobbyba</button>`;

            mutassUzenetet(winnerTxt, finalMsg + ctaHtml);
            startCelebration();
            document.body.classList.add('bg-winning');
            syncGameState();

            setTimeout(() => {
                const btn = document.getElementById('final-lobby-btn');
                if(btn) {
                    btn.addEventListener('click', async () => {
                        btn.innerText = "Kilépés folyamatban..."; btn.disabled = true;
                        if(window.cleanupRoom) await window.cleanupRoom(); window.location.reload();
                    });
                }
            }, 100);
        }

    </script>
</body>
</html>
